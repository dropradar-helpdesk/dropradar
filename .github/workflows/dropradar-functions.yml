name: DropRadar Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/dropradar-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dropradar-supabase-functions
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: frpadphgdzdakxytedqy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check deploy token
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Set the SUPABASE_ACCESS_TOKEN repository secret before deploying Edge Functions."
            exit 1
          fi

      - name: Deploy ingest Edge Function
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ingest-official-sources --project-ref "$SUPABASE_PROJECT_REF"
