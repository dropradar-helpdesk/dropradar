<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ee">
  <title>DropRadar Offline</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Segoe UI", "Noto Sans JP", system-ui, sans-serif;
      --paper: #f7f4ee;
      --ink: #202022;
      --muted: #6d6a62;
      --line: #ded8cb;
      --brand: #e24d3f;
      --brand-2: #0c8f7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
    }
    main {
      width: min(430px, 100%);
      padding: 28px 18px;
      display: grid;
      gap: 14px;
    }
    .mark {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      display: block;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      border-radius: 8px;
      background: #202022;
      color: #fff;
      text-decoration: none;
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="./icons/icon.svg" alt="" width="54" height="54">
    <h1>オフラインです</h1>
    <p>保存済みの画面は開けますが、最新の公式情報や差分確認には通信が必要です。</p>
    <a href="./">DropRadarを開く</a>
  </main>
</body>
</html>
